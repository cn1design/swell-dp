<style>

  height: 720px;
}
.dp-lp-hero > div {
  position: static;
  width: 100%;
}
.dp-lp-hero .wp-block-image {
  position: absolute;
  top: 0;
  right: 0;
  height: 100%;
  border-radius: var(--dp-radius) 0 0 var(--dp-radius);
  overflow: hidden;
}
.dp-lp-hero .wp-block-image img {

}
