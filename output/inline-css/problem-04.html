<!-- dp-deps: _c-bridge-copy _c-card-list _c-section-title _p-problem -->
<!-- wp:html -->
<style>
  /* -------------------------------------------
   * media-text-04 (問題提起 ＋ 右側カード一覧)
   * ------------------------------------------- */
  /* 背景バンド設定 */
  .dp-problem-section-band {
    position: relative;
  }
  .dp-problem-section-band::before {
    content: "";
    position: absolute;
    top: 144px;
    left: 50%;
    transform: translateX(-50%);
    width: min(100vw, 1440px);
    height: calc(50% + 128px);
    background-color: var(--color_main_thin);
    z-index: -1;
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band::before {
      top: 0;
      height: 87%;
    }
  }
  @media screen and (max-width: 599px) {
  .dp-problem-section-band::before {
      height: 90%;
    }
  }
  /* 2カラムレイアウト（左：テキスト、右：カード） */
  .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child {
    position: relative;
    align-items: center;
    gap: var(--dp-space-element-pc);
    margin-bottom: var(--dp-space-block-pc);
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child {
      flex-direction: column;
      gap: var(--dp-space-element-sp);
    }
  }
  @media screen and (max-width: 599px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child {
      margin-bottom: var(--dp-space-block-sp);
    }
  }
  
  /* 左側テキストエリア */
  .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child {
    flex: 0 0 40%;
    min-width: 0;
    text-align: left;
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child {
      width: 100%;
      max-width: 100%;
    }
  }
  .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child .dp-section-title {
    text-align: left;
    margin-bottom: var(--dp-space-element-pc);
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child .dp-section-title {
      text-align: center;
      margin-bottom: var(--dp-space-element-sp);
    }
  }
  .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child .c-lead {
    font-weight: 600;
    margin-bottom: var(--dp-space-inner-pc);
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child .c-lead {
      text-align: center;
    }
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :first-child > p {
      text-align: center;
    }
  }
  
  /* 右側カードエリア */
  .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :last-child {
    flex: 1;
    min-width: 0;
  }
  @media screen and (max-width: 1024px) {
    .dp-problem-section-band .swell-block-fullWide__inner > .wp-block-group:first-child > :last-child {
      width: 100%;
      max-width: 100%;
    }
  }
  
  /* 背景＋画像サイズ プレーン状態 */
  .dp-card-plain .swell-block-column {
    background-color: #ffffff;
    border-radius: var(--dp-radius);
    overflow: hidden;
  }
  .dp-card-plain .wp-block-image {
    margin: 0;
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }
  .dp-card-plain .wp-block-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .dp-card-plain i img {
    width: 64px;
    height: 100%;
    object-fit: contain;
  }
  .dp-card-plain p {
    padding: var(--dp-space-inner-pc) var(--dp-space-inner-pc);
  }
  
  /* ブリッジコピー（枠+三角矢印） */
  .dp-bridge-copy {
    position: relative;
    display: flex;
    justify-content: center;
  }
  .dp-bridge-copy p {
    position: relative;
    margin: 0;
    padding: var(--dp-space-element-pc) var(--dp-space-element-pc);
    background-color: var(--color_main);
    color: #ffffff;
    border: 4px solid var(--color_main);
    border-radius: var(--dp-radius);
    line-height: var(--dp-line-height-small);
    text-align: center;
    letter-spacing: var(--dp-letter-spacing-text);
    font-size: var(--dp-font-size-title-pc);
    font-weight: 600;
  }
  @media screen and (max-width: 768px) {
    .dp-bridge-copy p {
      padding: var(--dp-space-element-sp) var(--dp-space-inner-pc);
    }
  }
  @media screen and (max-width: 599px) {
    .dp-bridge-copy p {
      letter-spacing: var(--dp-letter-spacing-text);
      font-size: var(--dp-font-size-title-sp);
    }
  }
  .dp-bridge-copy::after {
    content: "";
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 48px solid transparent;
    border-right: 48px solid transparent;
    border-top: 32px solid var(--color_main);
  }
  @media screen and (max-width: 599px) {
    .dp-bridge-copy::after {
      bottom: -24px;
      border-left: 32px solid transparent;
      border-right: 32px solid transparent;
      border-top: 24px solid var(--color_main);
    }
  }
  </style>
<!-- /wp:html -->
