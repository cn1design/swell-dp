<style>

  }
  @media screen and (max-width: 599px) {
    .hero-split .en-title {
      letter-spacing: var(--dp-letter-spacing-text);
      font-size: var(--dp-font-size-explanation);
    }
  }
  .hero-split h1 {
    margin-bottom: var(--dp-space-element-sp);

    font-size: var(--dp-font-size-page-title);

  }
  @media screen and (max-width: 959px) {
    .hero-split h1 {
      font-size: var(--dp-font-size-title-pc);
    }
  }
  @media screen and (max-width: 599px) {
    .hero-split h1 {
      font-size: var(--dp-font-size-title-sp);
    }
  }
  .hero-split .title-copy {
    letter-spacing: var(--dp-letter-spacing-text);
  }
  .hero-split .title-copy-main {
    font-size: var(--dp-font-size-summary);
  }
  .hero-split .wp-block-group.hero-media {
    flex: 0 0 52%;
    margin-bottom: 0;
  }
  .hero-split .wp-block-group.hero-media img {
    height: 100%;
    aspect-ratio: 7/6;
    object-fit: cover;

  }
  @media screen and (max-width: 959px) {

  .hero-split.hero-split--b .hero-title-group > div {

  @media screen and (max-width: 959px) {

      max-width: 600px;

      background-color: var(--color_bg);
      border-radius: var(--dp-radius);
    }

  @media screen and (max-width: 768px) {

    }
  }
  @media screen and (max-width: 599px) {
    .hero-split.hero-split--b .text-block {
      margin-top: -32px;
      margin-left: 16px;
      padding: 24px 0 0 24px;
    }
  }
  
  /* フェードスライダー機能 */
  .wp-block-group.dp-fade-slider {
    display: grid !important;
  }
  .wp-block-group.dp-fade-slider .wp-block-image {
    grid-column: 1 / -1;
    grid-row: 1 / -1;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    z-index: 1;
    margin: 0;
  }
  .wp-block-group.dp-fade-slider.is-initialized .wp-block-image.is-active {
    opacity: 1;
    z-index: 2;
  }
  .wp-block-group.dp-fade-slider:not(.is-initialized) .wp-block-image:first-of-type {
    opacity: 1;
  }
  </style>
  
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const sliders = document.querySelectorAll('.dp-fade-slider');
    sliders.forEach(function(slider) {
      const images = slider.querySelectorAll('.wp-block-image');
      if (images.length < 2) return;
      
      // 初期化
      slider.classList.add('is-initialized');
      let currentIndex = 0;
      images[currentIndex].classList.add('is-active');
      
      // 4秒ごとにフェード切り替え
      setInterval(function() {
        images[currentIndex].classList.remove('is-active');
        currentIndex = (currentIndex + 1) % images.length;
        images[currentIndex].classList.add('is-active');
      }, 4000);
    });
  });
  </script>
