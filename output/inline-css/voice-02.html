<style>

}
.dp-card-voice .wp-block-image {

  width: 96px;
  height: 96px;
  margin: 0;
  overflow: hidden;
}

/* js-swipe-slider: 横スワイプスライダー */
.js-swipe-slider .dp-slider-nav {
  display: none;
}
.js-swipe-slider .dp-slider-nav__btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  background: var(--color_bg);
  border: 1px solid var(--color_text);
  border-radius: 50%;
  cursor: pointer;
  transition: background-color 0.15s, color 0.15s, opacity 0.15s;
}
.js-swipe-slider .dp-slider-nav__btn [class*=icon-] {
  font-size: 14px;
  line-height: 1;
  display: block;
}
.js-swipe-slider .dp-slider-nav__btn.is-edge {
  opacity: 0.5;
}
.js-swipe-slider .dp-slider-nav__btn:not(.is-edge):hover {
  background: var(--color_text);
  color: var(--color_bg);
}
.js-swipe-slider .dp-slider-nav__prev {
  left: 0;
}
.js-swipe-slider .dp-slider-nav__next {
  right: 0;
}
.js-swipe-slider .dp-slider-dots {
    display: none;
}
.js-swipe-slider.is-slider-active {
  position: relative;
}
.js-swipe-slider.is-slider-active .swell-block-columns__inner {
  display: flex !important;
  flex-direction: row !important;
  flex-wrap: nowrap !important;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  gap: var(--dp-space-inner-pc);
  scrollbar-width: none;
}
.js-swipe-slider.is-slider-active .swell-block-columns__inner::-webkit-scrollbar {
  display: none;
}
@media screen and (max-width: 599px) {
  .js-swipe-slider.is-slider-active .swell-block-columns__inner {
    gap: 16px;
  }
}
.js-swipe-slider.is-slider-active .swell-block-column {
  flex-shrink: 0 !important;
  scroll-snap-align: start;
  margin-bottom: 0 !important;
}
@media screen and (max-width: 959px) {
  .js-swipe-slider.is-slider-active .swell-block-column {
    width: calc(50% - 8px) !important;
  }
}
@media screen and (max-width: 599px) {
  .js-swipe-slider.is-slider-active .swell-block-column {
    width: 85% !important;
  }
}
.js-swipe-slider.is-slider-active .dp-slider-nav {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.js-swipe-slider.is-slider-active .dp-slider-nav .dp-slider-nav__btn {
    pointer-events: all;
}
@media screen and (max-width: 959px) {
    .js-swipe-slider.is-slider-active .dp-slider-nav {
        display: none;
    }
}
.js-swipe-slider.is-slider-active .dp-slider-dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: var(--dp-space-element-sp);
}
.dp-slider-dot {
    width: 48px;
    height: 4px;
    border-radius: 10px;
    background-color: #cccccc;
    border: none;
    padding: 0;
    cursor: pointer;
    transition: background-color 0.3s ease;
}
.dp-slider-dot.is-active {
    background-color: var(--color_main);
}
.dp-slider-dot::before {
    content: "";
    display: block;
    height: 20px;
    transform: translateY(-8px);
}

/* voice スライダー BP補正 */
@media screen and (max-width: 959px) {
    .dp-card-voice.js-swipe-slider.is-slider-active .swell-block-columns__inner {
        margin-left: 0;
        scroll-padding-left: var(--swl-fw_inner_pad, 0);
    }
    .dp-card-voice.js-swipe-slider.is-slider-active .swell-block-column {
        margin: 0;
    }
}
</style>
<script>
(function () {
  'use strict';

  const BP_PC = 959;

  function initSlider(slider) {
    const inner = slider.querySelector('.swell-block-columns__inner');
    const columns = slider.querySelectorAll('.swell-block-column');
    if (!inner || columns.length < 2) return;
    if (slider.querySelector('.dp-slider-nav')) return; // 二重初期化防止

    const nav = document.createElement('div');
    nav.className = 'dp-slider-nav';

    const prevBtn = document.createElement('button');
    prevBtn.type = 'button';
    prevBtn.className = 'dp-slider-nav__btn dp-slider-nav__prev';
    prevBtn.setAttribute('aria-label', '前へ');
    const prevIcon = document.createElement('span');
    prevIcon.className = 'icon-chevron-left';
    prevIcon.setAttribute('aria-hidden', 'true');
    prevBtn.appendChild(prevIcon);

    const nextBtn = document.createElement('button');
    nextBtn.type = 'button';
    nextBtn.className = 'dp-slider-nav__btn dp-slider-nav__next';
    nextBtn.setAttribute('aria-label', '次へ');
    const nextIcon = document.createElement('span');
    nextIcon.className = 'icon-chevron-right';
    nextIcon.setAttribute('aria-hidden', 'true');
    nextBtn.appendChild(nextIcon);

    nav.appendChild(prevBtn);
    nav.appendChild(nextBtn);
    slider.appendChild(nav);

    const dotsWrap = document.createElement('div');
    dotsWrap.className = 'dp-slider-dots';
    dotsWrap.setAttribute('role', 'tablist');
    dotsWrap.setAttribute('aria-label', 'スライダーナビゲーション');
    slider.appendChild(dotsWrap);

    let dotItems = [];
    let currentPageCount = 0;

    function shouldActivate() {
      if (window.innerWidth <= BP_PC) return true;
      return columns.length >= 4;
    }

    function getScrollAmount() {
      const cols = inner.querySelectorAll('.swell-block-column');
      if (cols.length < 2) return inner.clientWidth;
      const r0 = cols[0].getBoundingClientRect();
      const r1 = cols[1].getBoundingClientRect();
      return Math.abs(r1.left - r0.left);
    }

    function getPageCount() {
      const amount = getScrollAmount();
      if (amount === 0) return 1;
      const maxScroll = inner.scrollWidth - inner.clientWidth;
      if (maxScroll <= 0) return 1;
      return Math.round(maxScroll / amount) + 1;
    }

    function getCurrentIndex() {
      const amount = getScrollAmount();
      if (amount === 0) return 0;
      return Math.round(inner.scrollLeft / amount);
    }

    function scrollToIndex(index) {
      const amount = getScrollAmount();
      inner.scrollTo({ left: amount * index, behavior: 'smooth' });
    }

    function rebuildDots() {
      const pageCount = getPageCount();
      if (pageCount === currentPageCount) return;

      currentPageCount = pageCount;
      dotsWrap.innerHTML = '';
      dotItems = [];

      for (var i = 0; i < pageCount; i++) {
        (function (index) {
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'dp-slider-dot' + (index === 0 ? ' is-active' : '');
          dot.setAttribute('role', 'tab');
          dot.setAttribute('aria-label', (index + 1) + 'ページ目');
          dot.setAttribute('aria-selected', index === 0 ? 'true' : 'false');
          dot.addEventListener('click', function () {
            scrollToIndex(index);
          });
          dotsWrap.appendChild(dot);
          dotItems.push(dot);
        })(i);
      }
    }

    function updateButtons() {
      const atStart = inner.scrollLeft <= 1;
      const atEnd   = inner.scrollLeft + inner.clientWidth >= inner.scrollWidth - 1;
      prevBtn.classList.toggle('is-edge', atStart);
      nextBtn.classList.toggle('is-edge', atEnd);
    }

    function updateDots() {
      const current = getCurrentIndex();
      dotItems.forEach(function (dot, i) {
        const active = i === current;
        dot.classList.toggle('is-active', active);
        dot.setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }

    function activate() {
      slider.classList.add('is-slider-active');
      requestAnimationFrame(function () {
        rebuildDots();
        updateButtons();
        updateDots();
      });
    }

    function deactivate() {
      slider.classList.remove('is-slider-active');
      inner.scrollLeft = 0;
      currentPageCount = 0;
      dotsWrap.innerHTML = '';
      dotItems = [];
    }

    function refresh() {
      shouldActivate() ? activate() : deactivate();
    }

    prevBtn.addEventListener('click', function () {
      inner.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
    });

    nextBtn.addEventListener('click', function () {
      inner.scrollBy({ left: getScrollAmount(), behavior: 'smooth' });
    });

    inner.addEventListener('scroll', function () {
      updateButtons();
      updateDots();
    }, { passive: true });

    window.addEventListener('resize', refresh, { passive: true });

    refresh();
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-swipe-slider').forEach(initSlider);
  });
})();
</script>
<!-- /wp:html -->
